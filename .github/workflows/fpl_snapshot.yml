name: FPL Snapshot

on:
  schedule:
    # 06:00 UTC daily -- ahead of most FPL price-change activity
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      BUCKET: ${{ secrets.BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      # SEASON is deliberately not set: fpl_snapshot.py derives it from the
      # API payload so the partition label rolls over with the season.
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Fetch FPL snapshot and land in S3
        run: uv run python scripts/fpl_snapshot.py

      - name: Load raw tables in MotherDuck
        run: |
          uv run python scripts/load_raw.py fpl_bootstrap
          uv run python scripts/load_raw.py fpl_fixtures

      - name: Run dbt (staging + marts, whatever models exist)
        run: uv run dbt build --project-dir dbt --profiles-dir dbt

      # A failed run went unnoticed for two days in production (MotherDuck
      # trial lapsed silently) before anyone caught it manually -- the whole
      # platform's value depends on this run staying green, so a red run
      # needs to surface itself rather than wait to be found. One open issue
      # per ongoing incident (comment on the existing one instead of piling
      # up a new issue per failed day) so a multi-day outage doesn't spam.
      - name: Open or update an issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "FPL Snapshot workflow failed";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            const body = [
              `The daily snapshot failed on ${today}.`,
              "",
              `Run: ${runUrl}`,
              "",
              "S3 landing happens before the MotherDuck/dbt steps, so recent days' " +
                "raw data may already be safe -- check the run log to see which step " +
                "actually failed before assuming data was lost.",
            ].join("\n");

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "pipeline-failure",
            });

            if (openIssues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssues[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["pipeline-failure"],
              });
            }
