name: Understat Snapshot

on:
  schedule:
    # Mondays 06:30 UTC -- refresh the current season after the weekend round.
    # Separate from the daily FPL snapshot so a scrape failure against an
    # undocumented endpoint never takes down the live FPL pipeline.
    - cron: "30 6 * * 1"
  workflow_dispatch:
    inputs:
      seasons:
        description: "Space-separated season start years to backfill (empty = current season)"
        required: false
        default: ""

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      BUCKET: ${{ secrets.BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Fetch Understat league data and land in S3
        run: uv run python scripts/understat_snapshot.py ${{ inputs.seasons }}

      - name: Load raw tables in MotherDuck
        run: |
          uv run python scripts/load_raw.py understat_players
          uv run python scripts/load_raw.py understat_matches
          uv run python scripts/load_raw.py understat_teams

      - name: Run dbt (staging + marts, whatever models exist)
        run: uv run dbt build --project-dir dbt --profiles-dir dbt
