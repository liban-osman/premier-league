name: "fpl_data_platform"
version: "1.0.0"
config-version: 2

profile: "fpl_data_platform"

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

clean-targets:
  - "target"
  - "dbt_packages"

# dbt's own vocabulary (staging/marts) maps directly onto this project's
# raw -> silver -> gold layering from docs/architecture.md:
#   staging = silver (cleaned, typed, one model per source)
#   marts   = gold   (business-shaped, joined/aggregated for consumption)
# seeds are small, hand-maintained mapping inputs (e.g. the manual player-map
# overrides) -- conformance data, so they land in silver next to the maps
seeds:
  fpl_data_platform:
    +schema: silver
    seed_player_map_overrides_understat:
      +column_types:
        player_ud_id: integer
        fpl_player_code: integer

models:
  fpl_data_platform:
    staging:
      +materialized: view
      +schema: silver
    # cross-source conformance (e.g. the FPL <-> WhoScored player id map):
    # lives in silver alongside staging, but materialized as a table because
    # marts join through it repeatedly
    mapping:
      +materialized: table
      +schema: silver
    marts:
      +materialized: table
      +schema: gold
