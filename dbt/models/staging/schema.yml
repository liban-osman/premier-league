version: 2

models:
  - name: stg_fpl_players
    description: One row per (load_date, player_id) -- the unnested, typed player snapshot time series.
    columns:
      - name: player_id
        description: FPL element id.
        data_tests:
          - not_null
      - name: load_date
        data_tests:
          - not_null
      - name: now_cost
        description: Price in tenths of a million GBP (62 == GBP 6.2m).

  - name: stg_fpl_teams
    description: One row per (load_date, team_id) -- team strength/form/table position, historized.
    columns:
      - name: team_id
        data_tests:
          - not_null
      - name: load_date
        data_tests:
          - not_null

  - name: stg_fpl_fixtures
    description: One row per (load_date, fixture_id) -- the full 38-gameweek fixture list with FPL's own FDR ratings.
    columns:
      - name: fixture_id
        data_tests:
          - not_null
      - name: load_date
        data_tests:
          - not_null

  - name: stg_fpl_positions
    description: One row per position_id (GKP/DEF/MID/FWD). Static reference data, deduped to the latest snapshot.
    columns:
      - name: position_id
        data_tests:
          - not_null
          - unique

  - name: stg_whoscored_matches
    description: >
      One row per match -- match-level facts off the top of each WhoScored
      match-centre payload. season_start_year is derived from the match date,
      not the hand-set S3 partition label.
    columns:
      - name: match_id
        data_tests:
          - not_null
          - unique
      - name: home_goals
        description: "Parsed from the ftScore string; not_null guards that parse."
        data_tests:
          - not_null
      - name: away_goals
        data_tests:
          - not_null

  - name: stg_whoscored_events
    description: >
      One row per exported event element (~580k per season); the export
      contains a few duplicated event ids, so no uniqueness is claimed at
      this grain. Qualifiers stay as an opaque JSON blob.
    columns:
      - name: match_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_whoscored_matches')
                field: match_id
      - name: event_type
        data_tests:
          - not_null

  - name: stg_whoscored_players
    description: >
      One row per WhoScored player id with the most frequent name spelling --
      the WhoScored side of player_id_map.
    columns:
      - name: player_ws_id
        data_tests:
          - not_null
          - unique
      - name: player_name
        data_tests:
          - not_null

  - name: stg_understat_players
    description: >
      One row per (season, player) -- Understat's season aggregates (xG, xA,
      npxG, xGChain, xGBuildup). Latest load_date per season only.
    columns:
      - name: player_ud_id
        data_tests:
          - not_null
      - name: player_name
        data_tests:
          - not_null
      - name: season
        data_tests:
          - not_null

  - name: stg_understat_matches
    description: >
      One row per (season, match) with per-side goals and xG. Unplayed
      fixtures keep is_result = false and null goals/xG.
    columns:
      - name: match_ud_id
        data_tests:
          - not_null
      - name: season
        data_tests:
          - not_null

  - name: stg_understat_team_matches
    description: >
      One row per (season, team, match_date) -- per-match team analytics
      (xG/xGA, PPDA, deep completions, xPTS) unnested from the team history.
    columns:
      - name: team_ud_id
        data_tests:
          - not_null
      - name: team_name
        data_tests:
          - not_null
      - name: match_date
        data_tests:
          - not_null
