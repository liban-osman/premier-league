version: 2

models:
  - name: mart_player_price_momentum
    description: >
      Player price/ownership movement between consecutive snapshots -- the
      "rising/falling" transfer-in-or-drop signal the raw FPL API can't give you.

  - name: mart_player_value
    description: Points-per-GBP-million, ranked within position, recomputed per snapshot.

  - name: mart_player_form_trend
    description: Form and total_points movement between consecutive snapshots.

  - name: mart_player_availability_risk
    description: Collapses status, chance_of_playing_next_round, and news into one risk flag.

  - name: mart_team_fixture_difficulty
    description: >
      One row per (load_date, team_id, fixture_id) -- every fixture from each
      team's perspective, with FPL's own FDR rating plus a rolling average FDR
      over that team's next 5 unplayed fixtures.

  - name: mart_league_table
    description: >
      One row per (load_date, team_id) -- the league table derived from
      finished fixture results (points, W/D/L, goal difference), since FPL
      zeroes the bootstrap team records in preseason snapshots.
    columns:
      - name: team_id
        data_tests:
          - not_null
      - name: load_date
        data_tests:
          - not_null
      - name: points
        data_tests:
          - not_null
      - name: position
        data_tests:
          - not_null
      - name: form_last_5
        description: >
          Last five results as a 'W D L' string, oldest to newest (rightmost
          letter = most recent match). Null only when a team has no finished
          fixtures in the snapshot.

  - name: mart_transfer_decision
    description: >
      The decision layer: one row per (load_date, player_id) with a 0-100
      transfer_score (weighted percentile of value, form, underlying threat
      via Understat npxG+xA per 90, fixture ease, and transfer momentum
      within position) and a recommendation bucket, with availability as a
      hard gate. Carries each player's own previous snapshot alongside the
      current one, so recommendation_trend flags who just changed.
    columns:
      - name: player_id
        data_tests:
          - not_null
      - name: load_date
        data_tests:
          - not_null
      - name: transfer_score
        data_tests:
          - not_null
      - name: recommendation
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['transfer_in', 'hold', 'monitor', 'drop']
      - name: prev_recommendation
        description: >
          recommendation from this player's previous snapshot. Null only on
          a player's first-ever appearance in the mart -- no not_null test
          for exactly that reason, since dbt build runs in the live daily
          pipeline and would go red on every newly-added player.
        data_tests:
          - accepted_values:
              arguments:
                values: ['transfer_in', 'hold', 'monitor', 'drop']
      - name: recommendation_trend
        description: >
          upgraded / downgraded / unchanged / no_prior_snapshot, comparing
          recommendation to prev_recommendation. Always computed, never null.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['upgraded', 'downgraded', 'unchanged', 'no_prior_snapshot']

  - name: mart_team_defensive_outlook
    description: >
      One row per (load_date, team_id) -- a 0-100 defensive_outlook_score
      blending each team's clean-sheet rate so far this season with how easy
      their next 5 fixtures are, built for goalkeeper/defender transfer
      decisions that mart_transfer_decision's own signals barely speak to.
    columns:
      - name: team_id
        data_tests:
          - not_null
      - name: load_date
        data_tests:
          - not_null
      - name: defensive_outlook_score
        data_tests:
          - not_null
