version: 2

models:
  - name: player_id_map
    description: >
      One row per confidently matched player -- the explicit FPL <-> WhoScored
      join key (the two sources share no natural identifier). Built by a
      deterministic exact-match rule ladder over normalized names; see the
      model header for why fuzzy matching is deliberately excluded. The unique
      tests on both id columns are the 1:1 contract every cross-source join
      relies on.
    columns:
      - name: player_ws_id
        data_tests:
          - not_null
          - unique
      - name: fpl_player_id
        data_tests:
          - not_null
          - unique
      - name: match_rule
        description: Which ladder rule produced the match -- kept for debuggability.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["full_name", "short_name", "first_tokens", "web_name"]

  - name: player_id_map_understat
    description: >
      One row per confidently matched player -- the FPL <-> Understat join key,
      built by the same deterministic rule ladder as player_id_map, plus
      hand-verified manual overrides from seed_player_map_overrides_understat
      (overrides win over ladder matches). Both sources cover 2025/26, so
      unmatched players here are rarer and worth a look, unlike the expected
      cross-season gaps in the WhoScored map.
    columns:
      - name: player_ud_id
        data_tests:
          - not_null
          - unique
      - name: fpl_player_id
        data_tests:
          - not_null
          - unique
      - name: fpl_player_code
        description: >
          FPL's stable global asset id -- the cross-season join key, since
          player_id resets every season.
        data_tests:
          - not_null
          - unique
      - name: match_rule
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["full_name", "short_name", "first_tokens", "web_name", "manual"]
